name: release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build AAB and upload to Play Console (internal track, draft)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout (with tags for git-tag versioning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v3

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/keystore"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/keystore/upload.jks"

      - name: Write local.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_DEFAULT: ${{ secrets.ADMOB_BANNER_DEFAULT }}
          ADMOB_INTERSTITIAL_EXPORT_COMPLETE: ${{ secrets.ADMOB_INTERSTITIAL_EXPORT_COMPLETE }}
          ADMOB_APP_OPEN: ${{ secrets.ADMOB_APP_OPEN }}
          ADMOB_NATIVE: ${{ secrets.ADMOB_NATIVE }}
          ADMOB_REWARDED: ${{ secrets.ADMOB_REWARDED }}
          WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
          PROMOTION_API_AUTH_KEY: ${{ secrets.PROMOTION_API_AUTH_KEY }}
          PROMOTION_DEVICE_HASH_SALT: ${{ secrets.PROMOTION_DEVICE_HASH_SALT }}
        run: |
          {
            printf 'KEYSTORE_PATH=%s/keystore/upload.jks\n' "$GITHUB_WORKSPACE"
            printf 'KEYSTORE_PASSWORD=%s\n' "$KEYSTORE_PASSWORD"
            printf 'KEY_ALIAS=%s\n' "$KEY_ALIAS"
            printf 'KEY_PASSWORD=%s\n' "$KEY_PASSWORD"
            printf 'ADMOB_APP_ID=%s\n' "$ADMOB_APP_ID"
            printf 'ADMOB_BANNER_DEFAULT=%s\n' "$ADMOB_BANNER_DEFAULT"
            printf 'ADMOB_INTERSTITIAL_EXPORT_COMPLETE=%s\n' "$ADMOB_INTERSTITIAL_EXPORT_COMPLETE"
            printf 'ADMOB_APP_OPEN=%s\n' "$ADMOB_APP_OPEN"
            printf 'ADMOB_NATIVE=%s\n' "$ADMOB_NATIVE"
            printf 'ADMOB_REWARDED=%s\n' "$ADMOB_REWARDED"
            printf 'WEB_BASE_URL=%s\n' "$WEB_BASE_URL"
            printf 'PROMOTION_API_AUTH_KEY=%s\n' "$PROMOTION_API_AUTH_KEY"
            printf 'PROMOTION_DEVICE_HASH_SALT=%s\n' "$PROMOTION_DEVICE_HASH_SALT"
          } > local.properties

      - name: Build release bundle (.aab)
        run: ./gradlew :app:bundleRelease --no-daemon --stacktrace

      - name: Upload AAB artifact (for debugging / manual fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ github.ref_name }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Upload to Play Console (internal track, draft)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.pairshot
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          changesNotSentForReview: false
