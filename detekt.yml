style:
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
    ignoreHashCodeFunction: true
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreNamedArgument: true
    ignoreExtensionFunctions: true
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
  WildcardImport:
    active: true
  DataClassShouldBeImmutable:
    active: true
  UnusedParameter:
    active: true
    ignoreAnnotated:
      - 'Composable'
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - 'Preview'
      - 'androidx.compose.ui.tooling.preview.Preview'
  UseCheckOrError:
    active: true
  ReturnCount:
    active: true
    max: 3
  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 5
  ThrowsCount:
    active: true
    max: 3
    excludeGuardClauses: true

naming:
  TopLevelPropertyNaming:
    active: true
  MatchingDeclarationName:
    active: true
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
      - '**/core/designsystem/**'
  VariableNaming:
    active: true
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
  FunctionNaming:
    active: true
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
    ignoreAnnotated:
      - 'Composable'

complexity:
  LongMethod:
    active: true
    threshold: 80
    ignoreAnnotated:
      - 'Composable'
  LongParameterList:
    active: true
    functionThreshold: 10
    constructorThreshold: 12
    ignoreAnnotated:
      - 'Composable'
  TooManyFunctions:
    active: true
    thresholdInFiles: 30
    thresholdInClasses: 30
    thresholdInInterfaces: 20
    thresholdInObjects: 20
    thresholdInEnums: 10
  CyclomaticComplexMethod:
    active: true
    threshold: 15
    ignoreAnnotated:
      - 'Composable'
  LargeClass:
    active: true
    threshold: 400

empty-blocks:
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_^'
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

exceptions:
  TooGenericExceptionCaught:
    active: true
  InstanceOfCheckForException:
    active: true

potential-bugs:
  UnsafeCast:
    active: true

performance:
  SpreadOperator:
    active: true

formatting:
  active: true
  android: true
  autoCorrect: true
  FunctionName:
    active: false
  Filename:
    active: false
  NoWildcardImports:
    active: true
    autoCorrect: true
  PackageName:
    active: true
    autoCorrect: true
  MaximumLineLength:
    active: false
  Indentation:
    active: true
    autoCorrect: true
  ArgumentListWrapping:
    active: true
    autoCorrect: true
  Wrapping:
    active: true
    autoCorrect: true
  NoUnusedImports:
    active: true
    autoCorrect: true

Compose:
  ComposableAnnotationNaming:
    active: true
  ComposableNaming:
    active: true
  CompositionLocalAllowlist:
    active: true
    allowedCompositionLocals:
      - LocalAppTextScale
      - LocalPairShotExtendedColors
  ContentEmitterReturningValues:
    active: true
  DefaultsVisibility:
    active: true
  Material2:
    active: true
  ModifierClickableOrder:
    active: true
  ModifierComposed:
    active: true
  ModifierMissing:
    active: true
  ModifierNotUsedAtRoot:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: true
  MutableParams:
    active: true
  ParameterNaming:
    active: true
  PreviewNaming:
    active: true
  PreviewPublic:
    active: true
  RememberMissing:
    active: true
  TopLevelComposables:
    active: false
  UnstableCollections:
    active: true
  ViewModelForwarding:
    active: true
  ViewModelInjection:
    active: true
